<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RoboGridStrike</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="shell">
    <section class="hud">
      <div>
        <h1>RoboGridStrike</h1>
        <p>Realtime Grid Strategy Action Prototype</p>
      </div>
      <div class="status">
        <span id="hp">HP 100</span>
        <span id="wave">WAVE 1</span>
      </div>
    </section>

    <canvas id="game" width="960" height="540" aria-label="RoboGridStrike game canvas"></canvas>

    <section class="touch-controls" aria-label="Touch controls">
      <div class="touch-pad" aria-label="Movement">
        <button type="button" data-action="up">UP</button>
        <button type="button" data-action="left">LEFT</button>
        <button type="button" data-action="right">RIGHT</button>
        <button type="button" data-action="down">DOWN</button>
      </div>
      <div class="touch-actions" aria-label="Actions">
        <button type="button" data-action="dash">DASH</button>
        <button type="button" data-action="buster" data-hold="true">BUSTER</button>
        <button type="button" data-action="chip0">LiDAR</button>
        <button type="button" data-action="chip1">BLADE</button>
        <button type="button" data-action="chip2">CLONE</button>
        <button type="button" data-action="chip3">JAM</button>
        <button type="button" data-action="restart">REBOOT</button>
      </div>
    </section>

    <section class="controls">
      <div><b>Move</b> WASD / Arrows</div>
      <div><b>Dash</b> Space / Shift</div>
      <div><b>Buster</b> J / Z</div>
      <div><b>Chips</b> 1 LiDAR / 2 Blade / 3 Clone / 4 Jam</div>
      <div><b>Restart</b> R</div>
    </section>
  </main>
  <script src="./game.js"></script>
</body>
</html>
